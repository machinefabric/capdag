name: Release


on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ops_ref:
        description: "Git ref of jowharshamshiri/ops to build against"
        default: main
      tagged_urn_ref:
        description: "Git ref of machinefabric/tagged-urn-rs to build against"
        default: main

permissions:
  contents: write

env:
  # capdag's build.rs and several `env!()` sites require these at COMPILE time.
  # The `dx` build tool normally exports them; standalone CI must set them.
  #   MFR_FABRIC_MANIFEST_VERSION mirrors fabric/manifest-version.txt. Bump it
  #     here when that file changes (it is not in a standalone-checkoutable repo).
  #   MFR_CARTRIDGE_CHANNEL must be "release" or "nightly".
  MFR_FABRIC_MANIFEST_VERSION: "1"
  MFR_CARTRIDGE_CHANNEL: release
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: capdag-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: capdag-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: capdag-windows-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: capdag-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: capdag-macos-arm64

    steps:
      - name: Checkout capdag
        uses: actions/checkout@v4
        with:
          path: capdag

      - name: Checkout ops (path dependency)
        uses: actions/checkout@v4
        with:
          repository: jowharshamshiri/ops
          ref: ${{ github.event.inputs.ops_ref || 'main' }}
          path: ops

      - name: Checkout tagged-urn-rs (path dependency)
        uses: actions/checkout@v4
        with:
          repository: machinefabric/tagged-urn-rs
          ref: ${{ github.event.inputs.tagged_urn_ref || 'main' }}
          path: tagged-urn-rs

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # reqwest uses native-tls, which links system OpenSSL on Linux (SChannel
      # on Windows and SecureTransport on macOS need nothing extra). The runners
      # ship these, but install explicitly so the build never depends on it.
      - name: Install Linux TLS dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            capdag/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('capdag/Cargo.toml') }}

      - name: Build release binary
        working-directory: capdag
        run: cargo build --release --bin capdag --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        working-directory: capdag
        run: |
          set -euo pipefail
          BIN_DIR="target/${{ matrix.target }}/release"
          strip "$BIN_DIR/capdag" || true
          mkdir -p dist
          tar -czf "dist/${{ matrix.asset }}.tar.gz" -C "$BIN_DIR" capdag

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: capdag
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/capdag.exe" -DestinationPath "dist/${{ matrix.asset }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: capdag/dist/*

  release:
    name: Attach binaries to release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
